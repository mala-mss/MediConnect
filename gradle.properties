org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8 -Djava.net.preferIPv4Stack=true
android.useAndroidX=true
android.enableJetifier=true
kotlin.code.style=official
android.nonTransitiveRClass=true

# Maximum timeouts and retries for slow or unstable connections
systemProp.org.gradle.internal.http.connectionTimeout=500000
systemProp.org.gradle.internal.http.socketTimeout=500000
systemProp.http.connectionTimeout=500000
systemProp.http.socketTimeout=500000
systemProp.https.connectionTimeout=500000
systemProp.https.socketTimeout=500000
systemProp.org.gradle.internal.http.retries=10
systemProp.https.protocols=TLSv1.2,TLSv1.3
